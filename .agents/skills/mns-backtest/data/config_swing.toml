# 波段交易配置 - 更频繁的买入卖出
[settings]
annualized_target_low = 8.0
annualized_target_high = 12.0
min_holding_days = 14         # 更短的最小持仓天数
min_absolute_profit_days = 45
max_contrarian_weight = 2.0
report_output_dir = "./reports"

[allocation]
us_stocks = 60.0
cn_stocks = 25.0
counter_cyclical = 15.0

[thresholds]
extreme_fear = 25.0
fear = 42.0
neutral = 58.0
greed = 72.0

[buy_ratio]
extreme_fear = 70.0
fear = 45.0
neutral = 15.0                # 中性也买入
greed = 0.0

[sell_ratio]
extreme_greed_target_high = 60.0
extreme_greed_target_low = 40.0
extreme_greed_below_target = 25.0
greed_target_high = 45.0
greed_target_low = 30.0
neutral_target_high = 25.0    # 中性也减仓

[api]
fear_greed_url = "https://production.dataviz.cnn.io/index/fearandgreed/graphdata"
