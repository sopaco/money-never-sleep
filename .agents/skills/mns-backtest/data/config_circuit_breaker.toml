# 熔断抄底配置 - 在极端恐慌时全仓买入
[settings]
annualized_target_low = 10.0
annualized_target_high = 15.0
min_holding_days = 14
min_absolute_profit_days = 30
max_contrarian_weight = 4.0   # 极高逆向权重
report_output_dir = "./reports"

[allocation]
us_stocks = 60.0
cn_stocks = 25.0
counter_cyclical = 15.0

[thresholds]
extreme_fear = 35.0           # 放宽极度恐慌区间
fear = 48.0
neutral = 52.0
greed = 68.0

[buy_ratio]
extreme_fear = 90.0           # 极度恐慌时几乎全仓
fear = 60.0
neutral = 0.0
greed = 0.0

[sell_ratio]
extreme_greed_target_high = 60.0
extreme_greed_target_low = 40.0
extreme_greed_below_target = 25.0
greed_target_high = 45.0
greed_target_low = 30.0
neutral_target_high = 15.0

[api]
fear_greed_url = "https://production.dataviz.cnn.io/index/fearandgreed/graphdata"
